<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANPR System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4"><i class="fas fa-camera"></i> Number Plate Recognition</h2>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-upload"></i> Upload Image
                    </div>
                    <div class="card-body">
                        <input type="file" id="imageInput" class="form-control mb-3" accept="image/*">
                        <button class="btn btn-primary" onclick="detectPlate()">
                            <i class="fas fa-search"></i> Detect Plate
                        </button>
                        <div id="loading" class="mt-3" style="display: none;">
                            <div class="spinner-border text-primary"></div> Processing...
                        </div>
                    </div>
                </div>
                
                <div class="card shadow mt-4">
                    <div class="card-header bg-success text-white">
                        <i class="fas fa-video"></i> Live Camera Feed
                    </div>
                    <div class="card-body">
                        <img id="videoFeed" src="/video_feed" class="img-fluid rounded" style="width: 100%;">
                        <button class="btn btn-danger mt-2" onclick="stopFeed()">
                            <i class="fas fa-stop"></i> Stop Feed
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-info text-white">
                        <i class="fas fa-info-circle"></i> Detection Result
                    </div>
                    <div class="card-body" id="result">
                        <p class="text-muted text-center">No plate detected yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function detectPlate() {
            const file = document.getElementById('imageInput').files[0];
            if (!file) {
                alert('Please select an image');
                return;
            }
            
            const formData = new FormData();
            formData.append('image', file);
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').innerHTML = '<p class="text-center">Processing...</p>';
            
            fetch('/api/detect_plate', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                
                if (data.success) {
                    document.getElementById('result').innerHTML = `
                        <div class="alert alert-success">
                            <h5><i class="fas fa-check-circle"></i> Detected Number Plate:</h5>
                            <h3 class="text-primary text-center">${data.plate_number}</h3>
                            <hr>
                            <p><strong>Entry ID:</strong> ${data.entry_id}</p>
                            <p><strong>Time:</strong> ${new Date().toLocaleString()}</p>
                            ${data.result_image ? `<img src="/static/uploads/${data.result_image}" class="img-fluid rounded mt-2">` : ''}
                        </div>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle"></i> ${data.message || 'No plate detected'}
                        </div>
                    `;
                }
            })
            .catch(error => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').innerHTML = `
                    <div class="alert alert-danger">
                        Error: ${error.message}
                    </div>
                `;
            });
        }
        
        function stopFeed() {
            fetch('/stop_feed')
                .then(() => {
                    document.getElementById('videoFeed').src = '';
                    alert('Video feed stopped');
                });
        }
    </script>
</body>
</html>
